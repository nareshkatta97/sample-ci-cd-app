name: DevSecOps Pipeline — Scan, Build & Push to ghcr.io

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write        # push updated k8s manifest
  packages: write        # push image to ghcr.io
  security-events: write # publish CodeQL & Trivy results to GitHub Security tab
  actions: read          # required for CodeQL

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG:  v${{ github.run_number }}

jobs:

  # ── Job 1: Secrets Scan ────────────────────────────────────────────────
  secrets-scan:
    name: 🔐 Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for Gitleaks

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Gitleaks scans entire git history for:
        # API keys, passwords, tokens, private keys, etc.
        # Pipeline FAILS if any secrets are found ❌

  # ── Job 2: SAST Scan (CodeQL) ──────────────────────────────────────────
  sast-scan:
    name: 🔍 SAST Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: secrets-scan    # only runs if secrets scan passes ✅
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript   # matches your Node.js app
          queries: security-extended  # deeper security checks

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        # CodeQL automatically builds your code for analysis

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
        # Results published to GitHub Security tab → Code scanning alerts
        # Pipeline FAILS on critical/high severity findings ❌

  # ── Job 3: Build & Push Docker Image ───────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to ghcr.io
    runs-on: ubuntu-latest
    needs: [ secrets-scan, sast-scan ]   # only runs if both scans pass ✅
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}   # pass image to next job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.IMAGE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Image Scan (Trivy) ──────────────────────────────────────────
  image-scan:
    name: 🛡️ Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push   # only runs after image is pushed ✅

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif                   # structured format for GitHub Security tab
          output: trivy-results.sarif
          severity: CRITICAL,HIGH         # only fail on CRITICAL and HIGH
          exit-code: '1'                  # pipeline FAILS if vulns found ❌
          ignore-unfixed: true            # ignore vulns with no fix available

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()    # upload even if scan fails — so you can see results
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

  # ── Job 5: Update K8s Manifest ─────────────────────────────────────────
  update-manifest:
    name: 📝 Update K8s Manifest
    runs-on: ubuntu-latest
    needs: image-scan       # only runs if image scan passes ✅
    if: github.event_name == 'push'   # only on push to main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update deployment.yaml with new image tag
        run: |
          IMAGE="${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Updating deployment.yaml with image: $IMAGE"
          sed -i "s|image: ghcr.io.*|image: ${IMAGE}|g" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "CI: update image to ${{ env.IMAGE_TAG }} [skip ci]"
          git push
