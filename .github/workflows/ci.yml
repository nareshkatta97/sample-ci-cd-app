name: CI Pipeline — Build & Push to ghcr.io

# ── Trigger: runs on every push to main branch ───────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main        # also runs on PRs to main (build only, no push)

# ── Permissions: needed to push to ghcr.io ───────────────────────────────
permissions:
  contents: write   # to push updated k8s manifest back to repo
  packages: write   # to push Docker image to ghcr.io

# ── Jobs ─────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest   # GitHub-hosted runner (free)

    steps:

      # ── Step 1: Checkout source code ─────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Login to GitHub Container Registry ───────────────────
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}           # your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub ✅

      # ── Step 3: Extract metadata for image tag ───────────────────────
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ github.run_number }}   # e.g. v1, v2, v3

      # ── Step 4: Set up Docker Buildx (multi-platform builder) ────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 5: Build and push image to ghcr.io ──────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # only push on push, not PR
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      # ── Step 6: Update k8s manifest with new image tag ───────────────
      - name: Update Kubernetes manifest
        if: github.event_name == 'push'   # only on push to main, not PRs
        run: |
          IMAGE_TAG="v${{ github.run_number }}"
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_TAG}"

          echo "Updating deployment.yaml with image: $IMAGE"

          # Replace the image line in deployment.yaml
          sed -i "s|image: ghcr.io.*|image: ${IMAGE}|g" k8s/deployment.yaml

          # Configure git
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"

          # Commit and push if there are changes
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "CI: update image to ${IMAGE} [skip ci]"
          git push

      # ── Step 7: Print summary ─────────────────────────────────────────
      - name: Print image summary
        run: |
          echo "### ✅ Image pushed to ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository }}:v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }} by ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
