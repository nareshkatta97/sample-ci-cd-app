apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-ci-cd-app
  namespace: default
  labels:
    app: sample-ci-cd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-ci-cd-app
  template:
    metadata:
      labels:
        app: sample-ci-cd-app
    spec:
      # ── Pull secret for ghcr.io (needed if repo is private) ──────────
      # imagePullSecrets:
      #   - name: ghcr-secret    # uncomment if your repo is private

      containers:
        - name: sample-ci-cd-app
          image: ghcr.io/nareshkatta97/sample-ci-cd-app:v2
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: sample-ci-cd-app-svc
  namespace: default
spec:
  selector:
    app: sample-ci-cd-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
